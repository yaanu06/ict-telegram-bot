<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ICT Trading Bot Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 ICT Trading Bot Pro</h1>
            <p class="subtitle">AI-Powered | Limit Orders | JSON Output</p>
            <div class="status-row">
                <span id="liveTime" class="live-time"></span>
                <span id="apiSource" class="api-source">⚪ Ready</span>
            </div>
        </div>

        <!-- Market Selection -->
        <div class="section">
            <h3>🔄 Market</h3>
            <div class="btn-group">
                <button class="category-btn" data-category="crypto">💰 Crypto</button>
                <button class="category-btn" data-category="forex">💱 Forex</button>
                <button class="category-btn active" data-category="metals">🥇 Metals</button>
            </div>
        </div>

        <!-- Trading Pair -->
        <div class="section">
            <h3>💱 Trading Pair</h3>
            <select id="pairSelect" class="input-field">
                <option value="XAU/USD" selected>👑 XAU/USD</option>
                <option value="XAG/USD">🥈 XAG/USD</option>
                <option value="BTC/USD">₿ BTC/USD</option>
                <option value="ETH/USD">⟠ ETH/USD</option>
                <option value="EUR/USD">€ EUR/USD</option>
                <option value="GBP/USD">£ GBP/USD</option>
            </select>
        </div>

        <!-- Live Price -->
        <div class="section price-section">
            <h3>📈 Live Price</h3>
            <div id="currentPrice" class="current-price">----</div>
            <div id="priceChange" class="price-change">--</div>
        </div>

        <!-- Timeframe Selection -->
        <div class="section">
            <h3>⏱️ Timeframe</h3>
            <div class="timeframe-btns">
                <button class="tf-btn" data-tf="5M">5M</button>
                <button class="tf-btn active" data-tf="15M">15M</button>
                <button class="tf-btn" data-tf="1H">1H</button>
                <button class="tf-btn" data-tf="4H">4H</button>
                <button class="tf-btn" data-tf="1D">1D</button>
            </div>
        </div>

        <!-- Multi-Timeframe Analysis -->
        <div class="section">
            <h3>📊 Multi-Timeframe</h3>
            <div class="mtf-grid">
                <div class="mtf-card"><div class="mtf-header">5M</div><div class="mtf-trend" id="trend5M">--</div></div>
                <div class="mtf-card"><div class="mtf-header">15M</div><div class="mtf-trend" id="trend15M">--</div></div>
                <div class="mtf-card"><div class="mtf-header">1H</div><div class="mtf-trend" id="trend1H">--</div></div>
                <div class="mtf-card"><div class="mtf-header">4H</div><div class="mtf-trend" id="trend4H">--</div></div>
            </div>
        </div>

        <button id="analyzeBtn" class="analyze-btn">🔍 Analyze Market</button>

        <!-- JSON Output -->
        <div class="section json-section">
            <div class="json-header">
                <h3>📋 Analysis Output</h3>
                <button id="copyJsonBtn" class="copy-json-btn">📋 Copy</button>
            </div>
            <pre id="jsonOutput" class="json-output">Click "Analyze Market" to generate signal...</pre>
        </div>

        <!-- Limit Order Status -->
        <div class="section">
            <h3>📝 Limit Order</h3>
            <div id="limitOrderBox" class="limit-box">
                <span id="limitOrderText">No active limit order</span>
                <button id="cancelLimitBtn" class="cancel-btn hidden">✕ Cancel</button>
            </div>
            <button id="executeBtn" class="execute-btn" disabled>⚡ Place Limit Order</button>
        </div>

        <div id="notification" class="notification hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
